<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="dark light" />
  <meta name="description" content="Find the mathematically optimal way to split your shopping cart into orders." />
  <title>Cart Optimizer</title>
  <link rel="stylesheet" href="/static/styles.css?v=0.3.0" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-logo">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"
             stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="9" cy="20" r="1.3" /><circle cx="18" cy="20" r="1.3" />
          <path d="M2 3h3l2.4 12a1.6 1.6 0 0 0 1.6 1.3h8.2a1.6 1.6 0 0 0 1.6-1.3L21 7H6" />
        </svg>
      </span>
      <span class="brand-text">
        <span class="brand-name">Cart Optimizer</span>
        <span class="brand-tag" data-i18n="tagline">Find the cheapest way to split your order.</span>
      </span>
    </div>

    <div class="controls">
      <div class="menu-wrap">
        <button id="langBtn" class="btn-icon" aria-haspopup="true" aria-label="Language" data-i18n-aria="nav.language">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="10" /><path d="M2 12h20" />
            <path d="M12 2a15 15 0 0 1 4 10 15 15 0 0 1-4 10 15 15 0 0 1-4-10 15 15 0 0 1 4-10z" />
          </svg>
        </button>
        <div id="langMenu" class="menu" role="menu"></div>
      </div>
      <button id="themeBtn" class="btn-icon" aria-label="Toggle light or dark theme" data-i18n-aria="nav.theme"></button>
    </div>
  </header>

  <main>
    <div class="board" id="board"></div>
    <noscript>
      <p style="text-align:center;color:var(--muted)">
        This application needs JavaScript enabled to run.
      </p>
    </noscript>
  </main>

  <div class="actionbar" id="actionbar"></div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="/static/i18n.js?v=0.3.0"></script>
  <script src="/static/app.js?v=0.3.0"></script>
</body>
</html>
