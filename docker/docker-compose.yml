# Cart Optimizer — one-command self-hosting.
#
#   docker compose -f docker/docker-compose.yml up --build
#
# Then open http://localhost:8000

services:
  cart-optimizer:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: cart-optimizer:latest
    container_name: cart-optimizer
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      # The app is stateless and needs no secrets in v0.
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
    restart: unless-stopped
    # Hardening: the app writes nothing persistent at runtime. The root
    # filesystem is read-only; a small in-memory /tmp covers any transient
    # scratch space the runtime may need.
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
